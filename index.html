<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FNL Stats</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --fnl-deep-black: #0A0A0A;
            --fnl-charcoal: #1A1A1A;
            --fnl-cyan: #00FFD1;
            --fnl-magenta: #FF006B;
            --fnl-yellow: #FFFF00;
            --fnl-white: #FFFFFF;
            --fnl-light-grey: #B0B0B0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            background: var(--fnl-deep-black);
            font-family: 'Inter', sans-serif;
            overflow-y: hidden;
            overflow-x: auto;
        }

        .stats-bar {
            background: var(--fnl-deep-black);
            padding: 80px 60px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 40px;
        }

        .stat {
            text-align: center;
            padding: 30px;
            background: var(--fnl-charcoal);
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.3s ease;
            opacity: 0;
            transform: translateY(16px);
            animation: fadeUp 0.9s ease-out forwards;
        }

        .stat:nth-child(1) { animation-delay: 0.15s; }
        .stat:nth-child(2) { animation-delay: 0.4s; }
        .stat:nth-child(3) { animation-delay: 0.65s; }
        .stat:nth-child(4) { animation-delay: 0.9s; }

        @keyframes fadeUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .stat:hover {
            border-color: var(--fnl-cyan);
            transform: translateY(-5px);
        }

        .stat-number {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 60px;
            font-weight: 800;
            background: linear-gradient(90deg, var(--fnl-cyan), var(--fnl-magenta));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
        }

        .stat-label {
            font-size: 14px;
            color: var(--fnl-light-grey);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 12px;
        }

        @media (max-width: 768px) {
            .stats-bar {
                padding: 40px 0;
                display: flex;
                overflow-x: auto;
                scroll-snap-type: x mandatory;
                -webkit-overflow-scrolling: touch;
                gap: 15px;
                padding-left: 20px;
                padding-right: 20px;
            }
            .stats-bar::-webkit-scrollbar {
                display: none;
            }
            .stat {
                flex: 0 0 200px;
                scroll-snap-align: center;
                padding: 25px 20px;
            }
            .stat-number {
                font-size: 42px;
            }
            .stat-label {
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <section class="stats-bar">
        <div class="stat">
            <div class="stat-number" data-target="50" data-suffix="K+">0</div>
            <div class="stat-label">Runners in 2025</div>
        </div>
        <div class="stat">
            <div class="stat-number" data-target="3" data-suffix="">0</div>
            <div class="stat-label">UK Cities</div>
        </div>
        <div class="stat">
            <div class="stat-number" data-target="150" data-suffix="+">0</div>
            <div class="stat-label">Events Per Year</div>
        </div>
        <div class="stat">
            <div class="stat-number" data-target="4.9" data-suffix="&#9733;" data-decimals="1">0</div>
            <div class="stat-label">Average Rating</div>
        </div>
    </section>

    <script>
        function animateCounters() {
            const counters = document.querySelectorAll('.stat-number[data-target]');
            const duration = 2800;

            counters.forEach(counter => {
                const target = parseFloat(counter.dataset.target);
                const suffix = counter.dataset.suffix || '';
                const decimals = parseInt(counter.dataset.decimals) || 0;
                const start = performance.now();

                function easeOutExpo(t) {
                    return t === 1 ? 1 : 1 - Math.pow(2, -10 * t);
                }

                function update(now) {
                    const elapsed = now - start;
                    const progress = Math.min(elapsed / duration, 1);
                    const eased = easeOutExpo(progress);
                    const current = eased * target;

                    counter.textContent = current.toFixed(decimals) + suffix;

                    if (progress < 1) {
                        requestAnimationFrame(update);
                    }
                }

                requestAnimationFrame(update);
            });
        }

        // Use IntersectionObserver so it triggers when visible in iframe
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    animateCounters();
                    observer.disconnect();
                }
            });
        }, { threshold: 0.3 });

        observer.observe(document.querySelector('.stats-bar'));
    </script>
</body>
</html>
